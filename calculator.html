<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kalkulačka</title>
    <link rel="stylesheet" href="calculator.css">
    <script src="calculator.js" defer></script>
</head>
<body>
    <h1>Kalkulačka</h1>
    <p>Jednoduchá kalkulačka pro základní aritmetické operace.</p>
    <p> <button type="button" id="1" class="button number">1</button> <button type="button" id="2" class="button number">2</button> <button type="button" id="3" class="button number">3</button> <button type="button" id="plus" class="button operator">+</button></p>
    <p> <button type="button" id="4" class="button number">4</button> <button type="button" id="5" class="button number">5</button> <button type="button" id="6" class="button number">6</button> <button type="button" id="minus" class="button operator">-</button></p>
    <p> <button type="button" id="7" class="button number">7</button> <button type="button" id="8" class="button number">8</button> <button type="button" id="9" class="button number">9</button> <button type="button" id="multiply" class="button operator">*</button></p>
    <p> <button type="button" id="dot" class="button number">.</button> <button type="button" id="0" class="button number">0</button> <button type="button" id="equals" class="equals">=</button> <button type="button" id="divide" class="button operator">/</button> </p>
    <p> <button type="button" id="clear" class="button operator">AC</button> <button type="button" id="round bracket" class="button operator">(</button> <button type="button" id="round bracket2" class="button operator">)</button></p>
    <p><input type= "text" readonly= "readonly" id="display"></p>
    <p>Výsledek:</p>
    <p><input type="text" readonly="readonly" id="answer"></p>

</body>
